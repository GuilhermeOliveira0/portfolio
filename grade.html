<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Curricular da Fatec - Guilherme Henrique</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- SEO & Open Graph -->
  <meta name="description" content="Portfólio de Guilherme Henrique, estudante de Análise e Desenvolvimento de Sistemas (FATEC) e Desenvolvedor. Foco em C#, .NET, bancos de dados e eficiência operacional.">
  <meta name="author" content="Guilherme Henrique de Oliveira">
  <meta name="keywords" content="Guilherme Henrique, Desenvolvedor Backend, C#, .NET, SQL, Portfólio, ADS, Fatec, Programador, Back Office">
  <meta property="og:title" content="Portfólio | Guilherme Henrique - Desenvolvedor">
  <meta property="og:description" content="Portfólio de Guilherme Henrique, estudante de Análise e Desenvolvimento de Sistemas (FATEC) e Desenvolvedor. Foco em C#, .NET, bancos de dados e eficiência operacional.">
  <meta property="og:image" content="img/perfil.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://guilhermeoliveira0.github.io/portfolio/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>

  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

  <div id="navbar-placeholder"></div>

  <main id="main-content" class="page-container fade-in-section">
    <h1>Grade Curricular da Fatec</h1>

    <div class="filter-tabs">
      <button class="filter-btn active" data-semestre="todos">Todos</button>
      <button class="filter-btn" data-semestre="4">4º Ano</button>
      <button class="filter-btn" data-semestre="5">5º Ano</button>
    </div>
    
    <div class="disciplinas-grid grid-container" id="disciplinas-grid">
      <p class="status-message">Carregando disciplinas...</p>
    </div>
  </main>

  <div class="modal-overlay" id="disciplina-modal">
    <div class="modal-content">
      <button class="modal-close" aria-label="Fechar">&times;</button>
      <h2 id="modal-title"></h2>
      
      <p id="modal-resumo"></p>

      <p class="professor">Professor: <span id="modal-professor"></span></p>
      
      <h4>Conteúdo Trabalhado</h4>
      <ul id="modal-conteudo"></ul>
      
      <div id="modal-projeto-container">
        <h4>Projeto Relacionado</h4>
        <p id="modal-projeto-titulo"></p>
        <a href="javascript:void(0)" class="project-link" id="modal-projeto-link" target="_blank" rel="noopener noreferrer">Ver no GitHub</a>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="main.js?v=13" defer></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
        const disciplinasGrid = document.getElementById('disciplinas-grid');
        const modal = document.getElementById('disciplina-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalResumo = document.getElementById('modal-resumo');
        const modalProfessor = document.getElementById('modal-professor');
        const modalConteudo = document.getElementById('modal-conteudo');
        const modalProjetoContainer = document.getElementById('modal-projeto-container');
        const modalProjetoTitulo = document.getElementById('modal-projeto-titulo');
        const modalProjetoLink = document.getElementById('modal-projeto-link');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let allDisciplinas = [];

        function renderGrid(disciplinas) {
            disciplinasGrid.innerHTML = '';
            if (disciplinas.length === 0) {
              disciplinasGrid.innerHTML = `<p class="status-message">Nenhuma disciplina encontrada para este ano.</p>`;
                return;
            }
            disciplinas.forEach(disciplina => {
                const card = document.createElement('div');
                card.className = 'disciplina-card card';
                card.dataset.id = disciplina.id;
                
                const iconBg = disciplina.iconBg || 'linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%)';
                const icon = disciplina.icon || '📚';
                
                card.innerHTML = `
                  <div class="disciplina-badge">${disciplina.semestre}º Ano</div>
                    <div class="disciplina-icon" style="background: ${iconBg};">
                        ${icon}
                    </div>
                    <h3>${disciplina.titulo}</h3>
                    <p>${disciplina.descricao}</p>
                `;
                disciplinasGrid.appendChild(card);
            });
        }

        // FUNÇÃO showModal CORRIGIDA
        function showModal(disciplina) {
            modalTitle.textContent = disciplina.titulo;
            modalProfessor.textContent = disciplina.professor;
            
            if (disciplina.resumo) {
                modalResumo.textContent = disciplina.resumo;
                modalResumo.style.display = 'block';
            } else {
                modalResumo.style.display = 'none';
            }

            modalConteudo.innerHTML = '';
            disciplina.conteudo.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                modalConteudo.appendChild(li);
            });

            // LÓGICA DO PROJETO CORRIGIDA
            if (disciplina.projeto && disciplina.projeto.link) {
                modalProjetoContainer.style.display = 'block'; // Mostra a seção inteira
                modalProjetoTitulo.textContent = disciplina.projeto.titulo; // Define o texto do parágrafo
                modalProjetoLink.href = disciplina.projeto.link; // Define o link do botão
                modalProjetoLink.style.display = 'inline-block'; // Mostra o botão
            } else {
                modalProjetoContainer.style.display = 'none'; // Esconde a seção inteira
            }
            
            modal.classList.add('active');
        }

        function hideModal() {
            modal.classList.remove('active');
        }

        fetch('disciplinas.json')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                return response.json();
            })
            .then(data => {
                allDisciplinas = data;
                renderGrid(allDisciplinas);
            })
            .catch(error => {
                console.error('Erro ao carregar disciplinas.json:', error);
                disciplinasGrid.innerHTML = `<p class="status-message"><b>Erro ao carregar as disciplinas.</b><br>Verifique o arquivo 'disciplinas.json'.</p>`;
            });
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const semestre = btn.dataset.semestre;
                const filtered = semestre === 'todos' ? allDisciplinas : allDisciplinas.filter(d => d.semestre == semestre);
                renderGrid(filtered);
            });
        });

        disciplinasGrid.addEventListener('click', (event) => {
            const card = event.target.closest('.disciplina-card');
            if (card) {
                const disciplinaId = card.dataset.id;
                const disciplinaData = allDisciplinas.find(d => d.id === disciplinaId);
                if (disciplinaData) showModal(disciplinaData);
            }
        });

        modal.querySelector('.modal-close').addEventListener('click', hideModal);
        modal.addEventListener('click', (event) => {
            if (event.target === modal) hideModal();
        });

    });
  </script>
<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js" onload="new window.VLibras.Widget('https://vlibras.gov.br/app');"></script>
</body>
</html>
